
services:

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"

  vote:
    build: ./vote
    ports:
      - "8090:8080"
    depends_on:
      - redis
    environment:
      OPTION_A: Cats
      OPTION_B: Dogs
      REDIS_HOST: redis

  worker:
    build: ./worker
    depends_on:
      - redis
      - db
    environment:
      REDIS_HOST: redis
      POSTGRES_HOST: db

  result:
    build: ./result
    ports:
      - "8891:8888"
    depends_on:
      - db
    environment:
      POSTGRES_HOST: db